name: Present
options:
  bundleIdPrefix: com.present
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  PresentCore:
    path: .

targets:
  Present:
    type: application
    platform: macOS
    sources:
      - path: PresentApp
    info:
      path: PresentApp/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.present.app
        MARKETING_VERSION: "0.2.0-dev"
        INFOPLIST_FILE: PresentApp/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - package: PresentCore
        product: PresentCore
    postCompileScripts:
      - script: |
          set -euo pipefail
          CLI_DEST="$BUILT_PRODUCTS_DIR/Present.app/Contents/MacOS/present-cli"
          if [ "$CONFIGURATION" = "Release" ]; then
            swift build -c release --product present-cli --package-path "$SRCROOT"
            cp "$SRCROOT/.build/release/present-cli" "$CLI_DEST"
          else
            swift build --product present-cli --package-path "$SRCROOT"
            cp "$SRCROOT/.build/debug/present-cli" "$CLI_DEST"
          fi
        name: "Embed CLI Binary"
        outputFiles:
          - $(BUILT_PRODUCTS_DIR)/Present.app/Contents/MacOS/present-cli
