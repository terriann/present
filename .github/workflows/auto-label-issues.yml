name: Auto-label Issues

on:
  issues:
    types: [opened]

# Deny all permissions by default; grant only what's needed per job
permissions: {}

# Prevent concurrent runs for the same issue to avoid duplicate comments/labels
concurrency:
  group: auto-label-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  label:
    name: Triage and label issue
    runs-on: ubuntu-latest
    permissions:
      issues: write    # add labels and post triage comment
      contents: read   # checkout repo to read .claude/agents/pm.md
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2 • 7.5k ★ 2026 Jan 09
        with:
          persist-credentials: false

      - name: Label issue with Claude Code
        uses: anthropics/claude-code-action@edd85d61533cbba7b57ed0ca4af1750b1fdfd3c4 # v1 • 5.7k ★ 2025 Aug 26
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Bypass project-level .claude/settings.json; CI permissions are defined
          # explicitly below via `settings` so they are independent of local dev config.
          claude_args: --model claude-sonnet-4-6 --setting-sources user --allowedTools "Bash,Read,Glob,Grep"
          settings: |
            {
              "permissions": {
                "allow": [
                  "Bash(gh issue view *)",
                  "Bash(gh issue edit *)",
                  "Bash(gh issue comment *)"
                ]
              }
            }
          prompt: |
            You are acting as the PM agent for the Present project. Issue #${{ github.event.issue.number }} was just opened and needs to be triaged and labeled immediately.

            ## Your Task

            1. Fetch the issue to understand its content:
               ```
               gh issue view ${{ github.event.issue.number }} --json number,title,body,labels
               ```
            2. Read `.claude/agents/pm.md` for sizing/priority conventions.
            3. Classify this issue and apply ALL relevant labels from the categories below — skip any already applied.
            4. Use `gh issue edit` to add labels (never remove existing ones).
            5. Post a comment only if there is something worth saying — either the label choices need non-obvious explanation, or the issue has ambiguity that would meaningfully change how it is scoped or prioritized. Skip the comment entirely if the issue is clear and the labels are self-evident.
               If you do post a comment, it may include:
               - **Triage** (only if non-obvious): brief rationale for label choices that might surprise the author.
               - **Clarification** (only if genuinely unclear): concise questions about missing context, scope, or expected behavior.

            ## Available Labels

            **Type** (pick the most applicable):
            - `bug` — Something isn't working
            - `enhancement` — New feature or request
            - `documentation` — Documentation only

            **Size** (pick one):
            - `size/XS` — Trivial change, < 30 min
            - `size/S` — Small change, < 2 hours
            - `size/M` — Medium change, half day
            - `size/L` — Large change, 1–2 days
            - `size/XL` — Very large, 3+ days or needs breakdown

            **Priority** (pick one):
            - `P0-critical` — Blocking — drop everything
            - `P1-high` — Important — next up
            - `P2-medium` — Normal priority
            - `P3-low` — Nice to have, backlog

            **Feature** (apply all that fit):
            - `feature/menu-bar` — Menu bar timer, popover, quick-start
            - `feature/sessions` — Session types, lifecycle, breaks
            - `feature/activities` — Activity CRUD, archiving, external IDs
            - `feature/tags` — Tag management, activity-tag relationships
            - `feature/dashboard` — Dashboard view, today's summary
            - `feature/reports` — Summaries, charts, export
            - `feature/cli` — CLI commands, output formats
            - `feature/notifications` — System notifications, break suggestions
            - `feature/timeboxing` — Time box planning

            **Design** (apply all that fit):
            - `design/layout` — Spacing, alignment, structure
            - `design/color` — Color tokens, theming, palette
            - `design/typography` — Font styles, text hierarchy
            - `design/accessibility` — Accessibility, reduce motion, VoiceOver
            - `design/feedback` — Visual/audio feedback, sounds, animations
            - `design/interaction` — Gestures, controls, input behavior
            - `design/macos-conventions` — macOS HIG compliance, platform patterns
            - `design/sound` — Sound effects, SoundManager

            ## Commands to Use

            Apply labels:
            ```
            gh issue edit ${{ github.event.issue.number }} --add-label "label-name"
            ```

            Post the explanation comment:
            ```
            gh issue comment ${{ github.event.issue.number }} --body "..."
            ```

            Keep the comment brief: one sentence per label explaining why it was chosen.
