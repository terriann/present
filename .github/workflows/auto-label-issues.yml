name: Auto-label Issues

on:
  issues:
    types: [opened]

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Label issue with Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          allowed_tools: "Bash,Read,Grep,Glob"
          prompt: |
            You are acting as the PM agent for the Present project. Issue #${{ github.event.issue.number }} was just opened and needs to be triaged and labeled immediately.

            **Issue #${{ github.event.issue.number }}**
            Title: ${{ github.event.issue.title }}

            Body:
            ${{ github.event.issue.body }}

            Labels already applied at creation: ${{ github.event.issue.labels[0] && join(github.event.issue.labels.*.name, ', ') || 'none' }}

            ## Your Task

            1. Read `.claude/agents/pm.md` for label definitions and sizing/priority conventions.
            2. Read `.claude/skills/issue/SKILL.md` for `feature/*` and `design/*` label definitions.
            3. Classify this issue and apply ALL relevant labels from the categories below ‚Äî but **skip any label already listed above**.
            4. Use `gh issue edit` to add labels (never remove existing ones).
            5. Post one comment on the issue explaining your label choices concisely.

            ## Label Categories

            **Type** (pick the most applicable):
            - `bug` ‚Äî Something isn't working
            - `enhancement` ‚Äî New feature or request
            - `documentation` ‚Äî Documentation only

            **Size** (pick one):
            - `size/XS` ‚Äî Trivial change, < 30 min
            - `size/S` ‚Äî Small change, < 2 hours
            - `size/M` ‚Äî Medium change, half day
            - `size/L` ‚Äî Large change, 1‚Äì2 days
            - `size/XL` ‚Äî Very large, 3+ days or needs breakdown

            **Priority** (pick one):
            - `P0-critical` ‚Äî Blocking ‚Äî drop everything
            - `P1-high` ‚Äî Important ‚Äî next up
            - `P2-medium` ‚Äî Normal priority
            - `P3-low` ‚Äî Nice to have, backlog

            **Feature** (apply all that fit):
            - `feature/menu-bar` ‚Äî Menu bar timer, popover, quick-start
            - `feature/sessions` ‚Äî Session types, lifecycle, breaks
            - `feature/activities` ‚Äî Activity CRUD, archiving, external IDs
            - `feature/tags` ‚Äî Tag management, activity-tag relationships
            - `feature/dashboard` ‚Äî Dashboard view, today's summary
            - `feature/reports` ‚Äî Summaries, charts, export
            - `feature/cli` ‚Äî CLI commands, output formats
            - `feature/notifications` ‚Äî System notifications, break suggestions
            - `feature/timeboxing` ‚Äî Time box planning

            **Design** (apply all that fit):
            - `design/layout` ‚Äî Spacing, alignment, structure
            - `design/color` ‚Äî Color tokens, theming, palette
            - `design/typography` ‚Äî Font styles, text hierarchy

            ## Commands to Use

            Apply labels (use `--add-label` for each label, do not use `--remove-label`):
            ```
            gh issue edit ${{ github.event.issue.number }} --add-label "label-name"
            ```

            Post the explanation comment:
            ```
            gh issue comment ${{ github.event.issue.number }} --body "..."
            ```

            Keep the comment brief: one sentence per label explaining why it was chosen.
