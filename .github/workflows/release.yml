name: Stable Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions: {}

concurrency:
  group: stable-release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release
    runs-on: macos-15
    permissions:
      contents: write # create GitHub releases

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2 • 7.5k ★ 2025 Jan
        with:
          persist-credentials: false

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build DMG
        env:
          SIGNING_IDENTITY: '-'
        run: ./Scripts/build-dmg.sh

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          gh release create "$RELEASE_TAG" \
            build/Present.dmg \
            --latest \
            --generate-notes \
            --title "Present $RELEASE_TAG"
