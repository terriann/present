name: Stable Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions: {}

concurrency:
  group: stable-release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release
    runs-on: macos-15
    permissions:
      contents: write # create GitHub releases

    steps:
      - name: Build DMG
        uses: ./.github/actions/build-dmg

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          gh release create "$RELEASE_TAG" \
            build/Present.dmg \
            --latest \
            --generate-notes \
            --title "Present $RELEASE_TAG"
