name: CI
on:
  pull_request:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2 • 7.5k ★ 2025 Jan
        with:
          persist-credentials: false

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build app
        run: |
          xcodegen generate
          xcodebuild build -project Present.xcodeproj -scheme Present -destination 'platform=macOS'

      - name: Run unit tests (SPM)
        run: swift test --skip PresentBenchmarks

      - name: Build CLI (release)
        run: swift build -c release --product present-cli
