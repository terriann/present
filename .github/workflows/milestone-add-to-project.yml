name: Add Milestoned Issues to Project

on:
  issues:
    types: [milestoned]

# Deny all permissions by default; grant only what's needed per job
permissions: {}

# Prevent concurrent runs for the same issue
concurrency:
  group: milestone-project-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  add-to-project:
    name: Add to Present project
    runs-on: ubuntu-latest
    if: github.event.milestone.title == 'v0.2 — Session Depth & Reporting Clarity'
    steps:
      - uses: actions/add-to-project@244f685bbc3b7adfa8466e08b698b5577571133e # v1.0.2 • 678 ★ 2024 Jun 24
        with:
          project-url: https://github.com/users/terriann/projects/1
          github-token: ${{ secrets.ADD_TO_PROJECT_PAT }}
