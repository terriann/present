name: Build DMG
description: >
  Selects Xcode 16, installs XcodeGen, and builds an unsigned DMG via
  Scripts/build-dmg.sh. Requires the repo to already be checked out.
  Used by the beta and stable release workflows.

inputs:
  signing-identity:
    description: >
      Code-signing identity passed to build-dmg.sh as SIGNING_IDENTITY.
      Use '-' for ad-hoc (unsigned) builds. Set to a Developer ID identity
      string for signed builds.
    required: false
    default: '-'

runs:
  using: composite
  steps:
    - name: Select Xcode 16
      shell: bash
      run: sudo xcode-select -s /Applications/Xcode_16.app

    - name: Install XcodeGen
      shell: bash
      run: brew install xcodegen

    - name: Build DMG
      shell: bash
      env:
        SIGNING_IDENTITY: ${{ inputs.signing-identity }}
      run: ./Scripts/build-dmg.sh
