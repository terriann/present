name: Build DMG
description: >
  Checks out the repo, selects Xcode 16, installs XcodeGen, and builds
  an unsigned DMG via Scripts/build-dmg.sh. Used by the beta and stable
  release workflows.

inputs:
  signing-identity:
    description: >
      Code-signing identity passed to build-dmg.sh as SIGNING_IDENTITY.
      Use '-' for ad-hoc (unsigned) builds. Set to a Developer ID identity
      string for signed builds.
    required: false
    default: '-'

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2 • 7.5k ★ 2025 Jan
      with:
        persist-credentials: false

    - name: Select Xcode 16
      shell: bash
      run: sudo xcode-select -s /Applications/Xcode_16.app

    - name: Install XcodeGen
      shell: bash
      run: brew install xcodegen

    - name: Build DMG
      shell: bash
      env:
        SIGNING_IDENTITY: ${{ inputs.signing-identity }}
      run: ./Scripts/build-dmg.sh
